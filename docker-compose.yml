services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reportbuilder
      POSTGRES_USER: reportbuilder
      POSTGRES_PASSWORD: reportbuilder_dev
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
